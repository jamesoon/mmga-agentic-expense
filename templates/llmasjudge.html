{% extends "base.html" %}
{% block content %}
<div x-data="{ tab: 'overview' }" class="max-w-7xl mx-auto px-4 py-6">
  <h1 class="text-2xl font-headline mb-4">LLM-as-Judge &mdash; Evaluation Harness</h1>

  <nav class="flex gap-2 border-b border-outline-variant/30 mb-6">
    <button @click="tab='overview'" :class="tab==='overview' ? 'border-b-2 border-primary' : ''"
      class="px-4 py-2 text-sm font-bold uppercase tracking-widest">Overview</button>
    <button @click="tab='runs'" :class="tab==='runs' ? 'border-b-2 border-primary' : ''"
      class="px-4 py-2 text-sm font-bold uppercase tracking-widest">Runs</button>
    <button @click="tab='playground'" :class="tab==='playground' ? 'border-b-2 border-primary' : ''"
      class="px-4 py-2 text-sm font-bold uppercase tracking-widest">Playground</button>
    <button @click="tab='disagreement'" :class="tab==='disagreement' ? 'border-b-2 border-primary' : ''"
      class="px-4 py-2 text-sm font-bold uppercase tracking-widest">Disagreement</button>
  </nav>

  <div x-show="tab==='overview'">{% include "partials/llmasjudge_overview.html" %}</div>
  <div x-show="tab==='runs'">{% include "partials/llmasjudge_runs.html" %}</div>
  <div x-show="tab==='playground'">{% include "partials/llmasjudge_playground.html" %}</div>
  <div x-show="tab==='disagreement'">{% include "partials/llmasjudge_disagreement.html" %}</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="/static/js/llmasjudge.js"></script>
{% endblock %}
