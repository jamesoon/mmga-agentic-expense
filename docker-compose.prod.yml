# Production Docker Compose — runs on EC2 free-tier instance.
#
# Services on EC2:  app, qdrant, mcp-rag
# Services on AWS:  RDS PostgreSQL, Lambda (mcp-db, mcp-currency, mcp-email)
#
# The app connects to Lambda Function URLs for mcp-db, mcp-currency, mcp-email
# via env vars DB_MCP_URL, CURRENCY_MCP_URL, EMAIL_MCP_URL set in .env.prod.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build: .
    ports:
      - "80:8000"
    env_file:
      - .env.prod
    environment:
      # POSTGRES_HOST comes from .env.prod (set to RDS endpoint). Do NOT override
      # with ${RDS_ENDPOINT} here — if the shell var is unset during recreate,
      # it silently expands to "" and psycopg falls back to /var/run/postgresql,
      # which caused two recurring outages (2026-04-20, 2026-04-22).
      POSTGRES_PORT: "5432"
      QDRANT_HOST: qdrant
      RAG_MCP_URL: http://mcp-rag:8000/mcp/
      # DB_MCP_URL, CURRENCY_MCP_URL, EMAIL_MCP_URL come from .env.prod
      # (Lambda Function URLs injected by deploy script)
    depends_on:
      qdrant:
        condition: service_healthy
      mcp-rag:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./uploads:/data/uploads
      - ./eval:/app/eval:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mcp-rag:
    build: ./mcp_servers/rag
    platform: linux/amd64
    environment:
      FASTMCP_HOST: 0.0.0.0
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: expense_policies
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      HF_HOME: /root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src/agentic_claims/policy:/app/policy:ro
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  qdrant_data:
  hf_cache:
