# Production Docker Compose — all 7 services on EC2 with memory limits.
# Total cap: ~2.8 GB containers + ~750 MB OS = ~3.5 GB (target ≤ 4 GB).
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      # POSTGRES_HOST comes from .env.prod (set to RDS endpoint). Do NOT override
      # with ${RDS_ENDPOINT} here — if the shell var is unset during recreate,
      # it silently expands to "" and psycopg falls back to /var/run/postgresql,
      # which caused two recurring outages (2026-04-20, 2026-04-22).
      POSTGRES_PORT: "5432"
      QDRANT_HOST: qdrant
      RAG_MCP_URL: http://mcp-rag:8000/mcp/
      DB_MCP_URL: http://mcp-db:8000/mcp/
      CURRENCY_MCP_URL: http://mcp-currency:8000/mcp/
      EMAIL_MCP_URL: http://mcp-email:8000/mcp/
    depends_on:
      qdrant:
        condition: service_healthy
      mcp-rag:
        condition: service_healthy
      mcp-db:
        condition: service_healthy
      mcp-currency:
        condition: service_healthy
      mcp-email:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./scripts:/app/scripts:ro
      - ./uploads:/data/uploads
      - ./eval:/app/eval:ro
    mem_limit: 768m
    memswap_limit: 768m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mcp-rag:
    build: ./mcp_servers/rag
    platform: linux/amd64
    environment:
      FASTMCP_HOST: 0.0.0.0
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: expense_policies
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      HF_HOME: /root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./scripts:/app/scripts:ro
      - ./src/agentic_claims/policy:/app/policy:ro
      - hf_cache:/root/.cache/huggingface
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  mcp-db:
    build: ./mcp_servers/db
    environment:
      FASTMCP_HOST: 0.0.0.0
    env_file:
      - .env.prod
    mem_limit: 384m
    memswap_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  mcp-currency:
    build: ./mcp_servers/currency
    environment:
      FASTMCP_HOST: 0.0.0.0
    mem_limit: 256m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  mcp-email:
    build: ./mcp_servers/email
    environment:
      FASTMCP_HOST: 0.0.0.0
    env_file:
      - .env.prod
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null -w '%{http_code}' http://127.0.0.1:8000/mcp | grep -qE '^[0-9]+$'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  qdrant_data:
  hf_cache:
